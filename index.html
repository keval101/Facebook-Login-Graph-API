<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Social Auth</title>
        <link rel="stylesheet" href="bootstrap.min.css">
 <style>
         #heading, #profile, #logout{
                 display: none;
         }
 </style>
</head>
<body>
        
<script>
        window.fbAsyncInit = function() {
          FB.init({
            appId      : '117350830471378',
            cookie     : true,
            xfbml      : true,
            version    : 'v11.0'
          });
            
          
        FB.getLoginStatus(function(response) {
                statusChangeCallback(response);
        });   
            
        };
      
        (function(d, s, id){
           var js, fjs = d.getElementsByTagName(s)[0];
           if (d.getElementById(id)) {return;}
           js = d.createElement(s); js.id = id;
           js.src = "https://connect.facebook.net/en_US/sdk.js";
           fjs.parentNode.insertBefore(js, fjs);
         }(document, 'script', 'facebook-jssdk'));

         function statusChangeCallback(response){
                 if(response.status === 'connected'){
                        console.log('Logged in and authenicated')
                         setElements(true); 
                         testAPI(); 
                 }else{
                        console.log('Not authenticated')
                        setElements(false);
                         
                 }
         }

                
        function checkLoginState() {
        FB.getLoginStatus(function(response) {
        statusChangeCallback(response);
        });
        }

        function setElements(isLoggedIn){
                if(isLoggedIn){
                        document.getElementById('profile').style.display='block';
                        document.getElementById('logout').style.display='block';
                        document.getElementById('fb-btn').style.display='none';
                        document.getElementById('heading').style.display='none';
                }else{
                        document.getElementById('profile').style.display='none';
                        document.getElementById('logout').style.display='none';
                        document.getElementById('fb-btn').style.display='block';
                        document.getElementById('heading').style.display='block';
                }
        }

        function logout(){
                FB.logout(function(response){
                        setElements(false);
                })
        }

        function testAPI(){
                FB.api('/me?fields=name,email', function(response) {
                        if(response && !response.error){
                                // console.log(response)
                                buildProfile(response);
                        }
                })
        }
         
        function buildProfile(user){
                let profile = `
                        <h3>${user.name}</h3>
                        <ul class = 'list-group'>
                                <li class='list-group-item'>User ID : ${user.id}</li>        
                                <li class='list-group-item'>User Email : ${user.email}</li>        
                        </ul>
                `;
                document.getElementById('profile').innerHTML = profile;
        }
</script>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">Social Auth</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarColor01" aria-controls="navbarColor01" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
      
          <div class="collapse navbar-collapse" id="navbarColor01">
            <ul class="navbar-nav me-auto">
              <li class="nav-item">
                <a class="nav-link active" href="index.html">Home</a>
              </li>
            </ul>

            <ul class="navbar-nav mr-auto">
                    <li><a  class="nav-link" id="logout" href="#" onclick="logout()">Logout</a></li>
                <fb:login-button scope="public_profile,email" onlogin="checkLoginState();" id="fb-btn"> </fb:login-button>
              </ul>
          </div>
        </div>
      </nav>

      <div class="container mt-5">
              <h3 id="heading">Log in to view your profile</h3>
              <div id="profile"></div>
      </div>
</body>
</html>
